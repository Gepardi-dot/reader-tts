<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#23414b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Storybook Reader</title>
    <script>
      ;(() => {
        try {
          const cleanupFlag = 'storybook-origin-cleanup-v1'
          if (window.sessionStorage?.getItem(cleanupFlag)) {
            return
          }

          const tasks = []
          let shouldReload = false

          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then((registrations) => {
                if (registrations.length) {
                  shouldReload = true
                }
                return Promise.all(registrations.map((registration) => registration.unregister()))
              }),
            )
          }

          if ('caches' in window) {
            tasks.push(
              caches.keys().then((keys) => {
                if (keys.length) {
                  shouldReload = true
                }
                return Promise.all(keys.map((key) => caches.delete(key)))
              }),
            )
          }

          if (!tasks.length) {
            return
          }

          Promise.allSettled(tasks).then(() => {
            if (!shouldReload) {
              return
            }

            try {
              window.sessionStorage?.setItem(cleanupFlag, '1')
            } catch {
              // Ignore sessionStorage issues and continue with the refresh.
            }

            window.location.reload()
          })
        } catch {
          // Ignore cleanup failures and allow the app bundle to boot normally.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
